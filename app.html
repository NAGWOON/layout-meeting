<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Meeting — DASIFILL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="flex flex-col overflow-hidden" style="height:100vh;">

  <!-- ══ Header ═══════════════════════════════════════ -->
  <header class="header-bar flex-none flex items-center justify-between px-5 gap-4">

    <!-- 로고 — 클릭하여 이미지 교체 -->
    <label class="logo-area" title="클릭하여 로고 이미지 업로드" style="cursor:pointer;">
      <img id="logoImg" style="width:100%;height:100%;object-fit:contain;display:none;" alt="logo">
      <span class="logo-label" id="logoPlaceholder">DASIFILL</span>
      <input type="file" id="logoUpload" accept="image/png,image/jpeg,image/svg+xml,image/webp" class="hidden">
    </label>

    <!-- 타이틀 -->
    <div class="text-center flex-1">
      <h1 style="font-family:'Playfair Display',Georgia,'Times New Roman',serif;font-size:20px;font-weight:400;letter-spacing:0.06em;color:#fff;line-height:1.15;">Layout — Meeting</h1>
      <p style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:3px;letter-spacing:0.5px;" id="todayDate"></p>
    </div>

    <!-- 프로젝트명 -->
    <div class="flex flex-col items-end gap-0.5 flex-none">
      <label style="font-family:'Playfair Display',Georgia,serif;font-size:14px;font-weight:400;letter-spacing:0.12em;color:rgba(255,255,255,0.72);text-transform:uppercase;line-height:1.1;">Project Name</label>
      <input type="text" id="projectName" placeholder="enter project name" class="client-input">
    </div>
  </header>

  <!-- ══ 시안 탭 바 + 액션 버튼 ════════════════════ -->
  <div class="tab-bar flex-none flex items-center px-4 gap-1">
    <div id="tabContainer" class="flex items-center gap-1.5"></div>
    <button id="addTabBtn" class="add-tab-btn" title="시안 추가">
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
      </svg>
    </button>
    <div class="flex-1"></div>
    <!-- 내보내기 -->
    <button id="exportBtn" class="tab-action-btn" title="데이터 내보내기 (JSON)">
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12m-4-4l4 4 4-4"/>
      </svg>
    </button>
    <!-- 요약 인쇄 -->
    <button id="printBtn" class="tab-action-btn" title="미팅 요약 인쇄">
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 9V3h12v6M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v7H6v-7z"/>
      </svg>
    </button>
  </div>

  <!-- ══ Workspace ════════════════════════════════════ -->
  <div class="flex flex-1 min-h-0">

    <!-- 좌측: 도구 패널 -->
    <aside class="tool-panel flex-none flex flex-col items-center py-2 gap-1 overflow-y-auto">

      <!-- 도면 업로드 -->
      <label class="tool-btn" title="도면 업로드 (PNG·JPG·PDF)">
        <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1M12 12V4m0 0L8 8m4-4l4 4"/>
        </svg>
        <input type="file" id="floorPlanUpload" accept="image/png,image/jpeg,application/pdf" class="hidden">
      </label>

      <!-- 캔버스 PNG 저장 -->
      <button class="tool-btn" id="saveImgBtn" title="도면 이미지로 저장 (PNG)">
        <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12m-4-4l4 4 4-4"/>
        </svg>
      </button>
      <div class="tool-divider"></div>

      <!-- 선택 -->
      <button class="tool-btn active" data-tool="select" title="선택 / 이동">
        <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="currentColor">
          <path d="M4 1.5v18.7l5-5.3 3.5 8.6 2.6-1.1-3.5-8.5H17L4 1.5z"/>
        </svg>
      </button>

      <!-- 노트 마커 -->
      <button class="tool-btn" data-tool="note" title="노트 마커 배치">
        <span style="font-size:17px;line-height:1;">①</span>
      </button>

      <!-- 텍스트 레이블 -->
      <button class="tool-btn" data-tool="text" title="텍스트 레이블 배치">
        <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 6h16M4 12h10M4 18h7"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M17 12v9m-2-2.5h4"/>
        </svg>
      </button>

      <div class="tool-divider"></div>

      <!-- 지우개 -->
      <button class="tool-btn" data-tool="eraser" title="지우개 (선택 후 Delete)">
        <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M20 20H7L3 16 14 5l7 7-4 4"/>
          <line x1="7" y1="20" x2="20" y2="20" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="tool-divider"></div>

      <!-- 실행취소 -->
      <button class="tool-btn" id="undoBtn" title="실행취소 (Ctrl+Z)">
        <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 14L4 9l5-5"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 9h11a4 4 0 010 8H12"/>
        </svg>
      </button>

      <!-- 다시실행 -->
      <button class="tool-btn" id="redoBtn" title="다시실행 (Ctrl+Y)">
        <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 14l5-5-5-5"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 9H9a4 4 0 000 8h3"/>
        </svg>
      </button>

      <div class="tool-divider"></div>

      <!-- 화면 맞춤 -->
      <button class="tool-btn" id="zoomFitBtn" title="화면 맞춤 (뷰포트 초기화)">
        <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M4 8V5a1 1 0 011-1h3M4 16v3a1 1 0 001 1h3M16 4h3a1 1 0 011 1v3M16 20h3a1 1 0 001-1v-3"/>
        </svg>
      </button>

      <!-- 어노테이션 초기화 -->
      <button class="tool-btn" id="clearAnnotationsBtn" title="마커·텍스트 모두 지우기">
        <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3M4 7h16"/>
        </svg>
      </button>

      <div class="flex-1"></div>
      <div class="tool-divider"></div>

      <!-- 스티커 섹션 -->
      <p class="sticker-section-label">스티커</p>
      <div id="stickerBtns" class="flex flex-col items-center gap-1 w-full px-1.5"></div>
      <div style="height:8px;"></div>
    </aside>

    <!-- 중앙: 캔버스 -->
    <div id="canvasWrapper" class="flex-1 relative overflow-hidden">
      <canvas id="floorCanvas"></canvas>
    </div>

    <!-- 우측: 4탭 미팅 패널 -->
    <aside class="notes-panel flex-none flex flex-col">

      <!-- 탭 바 -->
      <div class="meeting-tabs">
        <button class="mtab active" data-tab="agenda">어젠다</button>
        <button class="mtab" data-tab="spaces">공간별</button>
        <button class="mtab" data-tab="decisions">결정</button>
        <button class="mtab" data-tab="notes">노트<span id="notesTabBadge"></span></button>
      </div>

      <!-- Tab: 어젠다 -->
      <div class="mtab-content active" data-tab="agenda">
        <div id="agendaProgress" class="agenda-progress-wrap"></div>
        <div id="agendaList" class="agenda-list"></div>
        <div class="agenda-add-wrap">
          <input type="text" id="agendaAddInput" placeholder="항목 추가..." class="agenda-add-input">
          <button id="agendaAddBtn" class="agenda-add-btn" title="추가">+</button>
        </div>

        <!-- 후속 액션 아이템 (다음 미팅 일정 대체) -->
        <div class="action-section">
          <div class="action-section-header">
            <span class="action-section-label">후속 액션</span>
            <span class="action-section-hint">미팅 후 처리할 일</span>
          </div>
          <div id="actionItemsList" class="action-items-list"></div>
          <div class="action-item-add-wrap">
            <input type="text" id="actionItemInput" placeholder="할 일 추가... (Enter)" class="action-item-input">
            <button id="actionItemAddBtn" class="action-item-add-btn">+</button>
          </div>
        </div>
      </div>

      <!-- Tab: 공간별 -->
      <div class="mtab-content hidden" data-tab="spaces">
        <div id="spaceCardsList" class="space-cards-list"></div>
      </div>

      <!-- Tab: 결정사항 -->
      <div class="mtab-content hidden" data-tab="decisions">
        <div class="decision-add-form">
          <div class="decision-type-row" id="decisionTypeBtns">
            <button class="dec-type-btn active" data-type="confirmed">✅ 확정</button>
            <button class="dec-type-btn" data-type="pending">⏸ 보류</button>
            <button class="dec-type-btn" data-type="research">🔍 검토</button>
          </div>
          <div class="decision-input-row">
            <select id="decisionSpaceSelect" class="decision-space-sel">
              <option value="">공간</option>
            </select>
            <input type="text" id="decisionText" placeholder="내용 입력 후 Enter" class="decision-text-input">
          </div>
        </div>
        <div id="decisionList" class="decision-list"></div>
      </div>

      <!-- Tab: 노트 -->
      <div class="mtab-content hidden" data-tab="notes">
        <div id="notesList" class="notes-list"></div>
        <div class="notes-divider"></div>
        <div class="memo-section">
          <div class="flex items-center justify-between mb-2">
            <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">메모</span>
            <span id="memoCharCount" class="text-xs text-gray-400">0자</span>
          </div>
          <textarea id="memoArea"
            placeholder="고객 요청사항, 현장 특이사항 등을 자유롭게 입력하세요..."
            class="memo-textarea"></textarea>
          <p class="text-xs mt-1.5" style="color:#C9CDD4;">자동 저장됩니다</p>
        </div>
      </div>

    </aside>
  </div>

  <!-- ══ 공간 명칭 바 ══════════════════════════════════ -->
  <div class="space-bar flex-none">
    <div class="space-bar-left">
      <span class="space-bar-label">공간</span>
      <button id="addSpaceBtn" class="add-space-btn" title="공간 추가">＋</button>
    </div>
    <div class="space-bar-divider"></div>
    <div id="spaceTagsContainer" class="space-tags-flow"></div>
  </div>

  <!-- ══ Footer ═══════════════════════════════════════ -->
  <footer class="footer-bar flex-none flex items-center justify-center">
    <p id="copyrightText"></p>
  </footer>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/image-db.js"></script>
  <script src="js/canvas-manager.js"></script>
  <script src="js/meeting-panel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
